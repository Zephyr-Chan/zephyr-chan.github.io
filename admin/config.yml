backend:
  name: github
  repo: Zephyr-Chan/zephyr-chan.github.io
  branch: main
  auth_endpoint: auth
  app_id: ""

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

locale: "zh"

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "_"

collections:
  # ===== 算法模板 =====
  - name: "algo_templates"
    label: "算法模板"
    label_singular: "算法模板"
    folder: "content/algo-templates"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}} ({{category}})"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "分类", name: "category", widget: "select", options: ["DP 动态规划", "图论", "字符串", "数学", "数据结构", "贪心", "搜索", "其他"], required: true }
      - { label: "难度", name: "difficulty", widget: "select", options: ["入门", "中等", "困难", "省选", "NOI"], required: false }
      - { label: "题目来源", name: "source", widget: "string", required: false }
      - { label: "代码", name: "code", widget: "code", language: "cpp", required: false, default: "// 在此粘贴代码" }
      - { label: "思路说明", name: "body", widget: "markdown", required: false }
      - { label: "标签", name: "tags", widget: "list", allow_add: true, field: { label: "标签", name: "tag", widget: "string" }, required: false }
      - { label: "发布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD", default: "{{now}}" }

  # ===== VP 记录 =====
  - name: "vp_notes"
    label: "VP记录"
    label_singular: "VP记录"
    folder: "content/vp-notes"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{contest}} — {{date}}"
    fields:
      - { label: "比赛名称", name: "contest", widget: "string", required: true }
      - { label: "比赛平台", name: "platform", widget: "select", options: ["Codeforces", "AtCoder", "Luogu", "Nowcoder", "LeetCode", "GDCPC", "ICPC", "CCPC", "蓝桥杯", "其他"], required: true }
      - { label: "比赛日期", name: "date", widget: "datetime", format: "YYYY-MM-DD", required: true }
      - { label: "Rating 变化", name: "rating_change", widget: "string", required: false, hint: "例如: +45 或 -12" }
      - { label: "排名", name: "rank", widget: "string", required: false }
      - { label: "VP 内容", name: "body", widget: "markdown", required: true }
      - { label: "标签", name: "tags", widget: "list", allow_add: true, field: { label: "标签", name: "tag", widget: "string" }, required: false }

  # ===== 相册照片 =====
  - name: "gallery_photos"
    label: "相册照片"
    label_singular: "照片"
    folder: "content/gallery"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "标题", name: "title", widget: "string", required: true }
      - { label: "照片", name: "image", widget: "image", required: true, hint: "拖拽上传或点击选择" }
      - { label: "描述", name: "description", widget: "string", required: false }
      - { label: "分类", name: "tag", widget: "select", options: ["会议", "实验室", "旅行", "获奖", "日常", "竞赛", "其他"], required: true }
      - { label: "拍摄日期", name: "date", widget: "datetime", format: "YYYY-MM-DD", required: false }
      - { label: "排序权重", name: "weight", widget: "number", value_type: "int", min: 0, max: 100, default: 50, required: false, hint: "数字越大越靠前" }

  # ===== 学习资料 =====
  - name: "learning_resources"
    label: "学习资料"
    label_singular: "学习资料"
    folder: "content/resources"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}} — {{category}}"
    fields:
      - { label: "名称", name: "title", widget: "string", required: true }
      - { label: "链接", name: "url", widget: "string", required: true }
      - { label: "描述", name: "description", widget: "string", required: false }
      - { label: "分类", name: "category", widget: "select", options: ["深度学习", "论文阅读", "编程语言", "算法竞赛", "科研工具", "效率工具", "其他"], required: true }
      - { label: "图标", name: "icon", widget: "select", options: ["fa-brain", "fa-book-open", "fa-laptop-code", "fa-code", "fa-flask", "fa-tools", "fa-graduation-cap", "fa-link"], required: false }
      - { label: "颜色", name: "color", widget: "select", options: ["#e74c3c", "#3498db", "#2ecc71", "#9b59b6", "#f39c12", "#1abc9c", "#e67e22", "#34495e"], required: false }

  # ===== 友链 =====
  - name: "friend_links"
    label: "友链"
    label_singular: "友链"
    folder: "content/friends"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{name}}"
    fields:
      - { label: "名称", name: "name", widget: "string", required: true }
      - { label: "网站地址", name: "url", widget: "string", required: true }
      - { label: "描述", name: "description", widget: "string", required: false }
      - { label: "头像", name: "avatar", widget: "image", required: false, hint: "留空则显示首字母" }
      - { label: "头像背景色", name: "avatar_color", widget: "select", options: ["linear-gradient(135deg, #667eea, #764ba2)", "linear-gradient(135deg, #0093E9, #80D0C7)", "linear-gradient(135deg, #f093fb, #f5576c)", "linear-gradient(135deg, #43e97b, #38f9d7)", "linear-gradient(135deg, #f7971e, #ffd200)"], required: false }
